###############################################################################
# Argus Default Configuration
# Network traffic interception tool for malware analysis
###############################################################################

[Argus]
DivertTraffic: Yes

###############################################################################
[Diverter]
NetworkMode: Auto
DumpPackets: Yes
DumpPacketsFilePrefix: packets
RedirectAllTraffic: Yes
DefaultTCPListener: RawTCPListener
DefaultUDPListener: RawUDPListener

###############################################################################
# Listeners
###############################################################################

[HTTPListener]
Enabled: True
Listener: HTTPListener
Port: 80
Protocol: TCP
UseSSL: No
Timeout: 10
Forward: example.*
# Forward: curl.exe, 1234, 93.184.216.34, example.com, http://evil.com/payload
#   Comma-separated list — supported entry types:
#     process name  →  curl.exe, wget.exe          (case-insensitive regex)
#     PID           →  1234
#     IPv4 address  →  93.184.216.34
#     IPv6 address  →  2606:2800:220:1:248:1893:25c8:1946
#     domain        →  example.com                 (matches any path)
#     domain+path   →  example.com/api/v1          (matches paths starting with /api/v1)
#     URL           →  http://example.com/path     (scheme stripped, then matched as domain+path)
#   Connections matching any entry are forwarded to the real destination.
#   Leave absent or empty to always respond with fake data.
# NoLog: curl.exe, 1234, 93.184.216.34, analytics\.example\.com
#   Same entry types as Forward.  Connections matching any entry are NOT
#   written to the request/response log files.  Leave absent or empty to
#   log everything.

[HTTPSListener]
Enabled: True
Listener: HTTPListener
Port: 443
Protocol: TCP
UseSSL: Yes
Timeout: 10
Forward: https://www.microsoft.*
# Forward: curl.exe, 1234, 93.184.216.34, example.com, http://evil.com/payload
#   Comma-separated list — supported entry types:
#     process name  →  curl.exe, wget.exe          (case-insensitive regex)
#     PID           →  1234
#     IPv4 address  →  93.184.216.34
#     IPv6 address  →  2606:2800:220:1:248:1893:25c8:1946
#     domain        →  example.com                 (matches any path)
#     domain+path   →  example.com/api/v1          (matches paths starting with /api/v1)
#     URL           →  http://example.com/path     (scheme stripped, then matched as domain+path)
#   Connections matching any entry are forwarded to the real destination.
#   Leave absent or empty to always respond with fake data.
# NoLog: curl.exe, 1234, 93.184.216.34, analytics\.example\.com
#   Same entry types as Forward.  Connections matching any entry are NOT
#   written to the request/response log files.  Leave absent or empty to
#   log everything.

[DNSListener]
Enabled: False
Listener: DNSListener
Port: 53
Protocol: UDP
ResponseA: 127.0.0.1
ResponseMX: mail.argus.local
ResponseTXT: ARGUS

[SMTPListener]
Enabled: False
Listener: SMTPListener
Port: 25
Protocol: TCP
Banner: 220 argus.local SMTP Service Ready

[FTPListener]
Enabled: False
Listener: FTPListener
Port: 21
Protocol: TCP
Banner: 220 Argus FTP Server

[IRCListener]
Enabled: False
Listener: IRCListener
Port: 6667
Protocol: TCP

[POPListener]
Enabled: False
Listener: POPListener
Port: 110
Protocol: TCP
Banner: +OK Argus POP3 Server Ready

[RawTCPListener]
Enabled: False
Listener: RawListener
Port: 1337
Protocol: TCP
Timeout: 5

[RawUDPListener]
Enabled: False
Listener: RawListener
Port: 1338
Protocol: UDP
Timeout: 5
