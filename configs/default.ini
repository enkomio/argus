###############################################################################
# Argus Default Configuration
# Network traffic interception tool for malware analysis
###############################################################################

[Argus]
DivertTraffic: Yes

###############################################################################
[Diverter]
NetworkMode: Auto
DumpPackets: Yes
DumpPacketsFilePrefix: packets
RedirectAllTraffic: Yes
DefaultTCPListener: RawTCPListener
DefaultUDPListener: RawUDPListener

###############################################################################
# Listeners
###############################################################################

[HTTPListener]
Enabled: False
Listener: HTTPListener
ServicePort: 80
ListenerPort: 18080
Protocol: TCP
UseSSL: No
Timeout: 10
Passthrough: example.*
# Passthrough: curl.exe, 1234, 93.184.216.34, example.com, http://evil.com/payload
#   Comma-separated list — supported entry types:
#     process name  →  curl.exe, wget.exe          (case-insensitive regex)
#     PID           →  1234
#     IPv4 address  →  93.184.216.34
#     IPv6 address  →  2606:2800:220:1:248:1893:25c8:1946
#     domain        →  example.com                 (matches any path)
#     domain+path   →  example.com/api/v1          (matches paths starting with /api/v1)
#     URL           →  http://example.com/path     (scheme stripped, then matched as domain+path)
#   Connections matching any entry are passed through to the real destination.
#   Leave absent or empty to always respond with fake data.
# NoLog: curl.exe, 1234, 93.184.216.34, analytics\.example\.com
#   Same entry types as Passthrough.  Connections matching any entry are NOT
#   written to the request/response log files.  Leave absent or empty to
#   log everything.

[HTTPSListener]
Enabled: False
Listener: HTTPListener
ServicePort: 443
ListenerPort: 18443
Protocol: TCP
UseSSL: Yes
Timeout: 10
Passthrough: https://www.microsoft.*
# Passthrough: curl.exe, 1234, 93.184.216.34, example.com, http://evil.com/payload
#   Comma-separated list — supported entry types:
#     process name  →  curl.exe, wget.exe          (case-insensitive regex)
#     PID           →  1234
#     IPv4 address  →  93.184.216.34
#     IPv6 address  →  2606:2800:220:1:248:1893:25c8:1946
#     domain        →  example.com                 (matches any path)
#     domain+path   →  example.com/api/v1          (matches paths starting with /api/v1)
#     URL           →  http://example.com/path     (scheme stripped, then matched as domain+path)
#   Connections matching any entry are passed through to the real destination.
#   Leave absent or empty to always respond with fake data.
# NoLog: curl.exe, 1234, 93.184.216.34, analytics\.example\.com
#   Same entry types as Passthrough.  Connections matching any entry are NOT
#   written to the request/response log files.  Leave absent or empty to
#   log everything.

[DNSListener]
Enabled: False
Listener: DNSListener
ServicePort: 53
ListenerPort: 10053
Protocol: UDP
ResponseA: 127.0.0.1
ResponseMX: mail.argus.local
ResponseTXT: ARGUS
Passthrough: example.com
# Passthrough: curl.exe, 1234, 93.184.216.34, example.com, .*\.microsoft\.com
#   Comma-separated list — supported entry types:
#     process name  →  curl.exe, wget.exe          (case-insensitive regex)
#     PID           →  1234
#     IPv4 address  →  93.184.216.34               (client source IP)
#     IPv6 address  →  2606:2800:220:1:248:1893:25c8:1946
#     domain        →  example.com                 (matches exact and subdomains)
#     domain regex  →  .*\.microsoft\.com          (full regex supported)
#   Matching queries are forwarded to the real DNS server instead of being faked.
#   Leave absent or empty to always respond with fake data.
# NoLog: curl.exe, 1234, 93.184.216.34, analytics\.example\.com
#   Same entry types as Passthrough.  Matching queries are NOT written to log files.

[SMTPListener]
Enabled: False
Listener: SMTPListener
ServicePort: 25
ListenerPort: 10025
Protocol: TCP
Banner: 220 argus.local SMTP Service Ready

[POPListener]
Enabled: False
Listener: POPListener
ServicePort: 110
ListenerPort: 10110
Protocol: TCP
Banner: +OK Argus POP3 Server Ready

[RawTCPListener]
Enabled: False
Listener: RawListener
ServicePort: 1337
ListenerPort: 11337
Protocol: TCP
Timeout: 5

[RawUDPListener]
Enabled: False
Listener: RawListener
ServicePort: 1338
ListenerPort: 11338
Protocol: UDP
Timeout: 5
